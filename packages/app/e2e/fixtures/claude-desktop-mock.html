<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Claude</title>
  <style>
    :root {
      --bg: #f5f4ef;
      --panel: #ffffff;
      --text: #1f1e1b;
      --muted: #6b6860;
      --border: #e4e1d8;
      --user: #ebe8e0;
      --assistant: #ffffff;
      --accent: #d97757;
      --input: #f7f6f2;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 1440px;
      height: 900px;
      overflow: hidden;
      background: #2a2926;
      font-family: "Source Serif 4", "Iowan Old Style", "Palatino Linotype", Palatino, serif;
      color: var(--text);
    }
    .window {
      width: 1440px;
      height: 900px;
      background: var(--bg);
      display: grid;
      grid-template-rows: 44px 1fr 92px;
    }
    .chrome {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      background: #f0eee7;
    }
    .traffic {
      display: flex;
      gap: 7px;
    }
    .traffic span {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: #cfc9bc;
    }
    .traffic span:nth-child(1) { background: #ff5f57; }
    .traffic span:nth-child(2) { background: #febc2e; }
    .traffic span:nth-child(3) { background: #28c840; }
    .chrome-title {
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.01em;
    }
    .chat {
      padding: 36px 180px 24px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }
    .msg {
      max-width: 820px;
      line-height: 1.55;
      font-size: 20px;
    }
    .msg.assistant {
      align-self: stretch;
      color: var(--text);
    }
    .msg.user {
      align-self: flex-end;
      background: var(--user);
      border-radius: 18px;
      padding: 14px 18px;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      font-size: 17px;
    }
    .label {
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      font-size: 12px;
      font-weight: 650;
      color: var(--muted);
      margin-bottom: 8px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .composer {
      margin: 0 180px 24px;
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: 18px;
      min-height: 64px;
      padding: 16px 18px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      box-shadow: 0 8px 24px rgba(40, 35, 25, 0.06);
    }
    .composer-input {
      flex: 1;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      font-size: 16px;
      line-height: 1.45;
      color: var(--text);
      white-space: pre-wrap;
      min-height: 24px;
    }
    .composer-input:empty::before {
      content: "Message Claude…";
      color: #9a958a;
    }
    .send {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      margin-top: 2px;
      opacity: 0.35;
    }
    .send.is-ready { opacity: 1; }
    .caret {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--text);
      vertical-align: -2px;
      margin-left: 1px;
      animation: blink 1s steps(1, end) infinite;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="window" data-claude-mock>
    <div class="chrome">
      <div class="traffic" aria-hidden="true"><span></span><span></span><span></span></div>
      <div class="chrome-title">Claude — checkout workflow</div>
    </div>
    <div class="chat" id="chat">
      <div class="msg assistant" id="assistant-1">
        <div class="label">Claude</div>
        <div>
          I drafted a three-task Invoker plan for the checkout handlers work:
          implement handlers, wire tests, then open the review gate.
          Say when you want it submitted.
        </div>
      </div>
      <div class="msg user hidden" id="user-1">
        <div id="user-1-text"></div>
      </div>
      <div class="msg assistant hidden" id="assistant-2">
        <div class="label">Claude</div>
        <div>Submitting to Invoker now — the workflow chain will show up on your Plan graph.</div>
      </div>
    </div>
    <div class="composer">
      <div class="composer-input" id="composer"><span class="caret" id="caret"></span></div>
      <div class="send" id="send" aria-hidden="true"></div>
    </div>
  </div>
  <script>
    window.__claudeMock = {
      async typeUserMessage(text, { charDelayMs = 55 } = {}) {
        const user = document.getElementById("user-1");
        const userText = document.getElementById("user-1-text");
        const composer = document.getElementById("composer");
        const caret = document.getElementById("caret");
        const send = document.getElementById("send");
        user.classList.add("hidden");
        userText.textContent = "";
        composer.textContent = "";
        composer.appendChild(caret);
        send.classList.remove("is-ready");
        for (let i = 0; i < text.length; i += 1) {
          composer.insertBefore(document.createTextNode(text[i]), caret);
          await new Promise((r) => setTimeout(r, charDelayMs));
        }
        send.classList.add("is-ready");
      },
      async commitUserMessage(text) {
        const user = document.getElementById("user-1");
        const userText = document.getElementById("user-1-text");
        const composer = document.getElementById("composer");
        const caret = document.getElementById("caret");
        const send = document.getElementById("send");
        userText.textContent = text;
        user.classList.remove("hidden");
        composer.textContent = "";
        composer.appendChild(caret);
        send.classList.remove("is-ready");
      },
      showAssistantReply() {
        document.getElementById("assistant-2").classList.remove("hidden");
      },
    };
  </script>
</body>
</html>
