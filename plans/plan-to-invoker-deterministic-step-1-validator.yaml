name: "Plan-to-Invoker Deterministic Step 1: Typed plan validator"
description: |
  Replace grep-heavy plan validation with a typed validator that parses YAML
  structurally and returns deterministic pass/fail plus machine-readable errors.

  This reduces policy drift and removes ambiguous markdown interpretation from
  the critical path.
onFinish: pull_request
mergeMode: external_review
baseBranch: master
repoUrl: git@github.com:example-org/acme-repo.git

tasks:
  - id: implement-typed-plan-validator
    description: |
      Implement a Node/TypeScript validator to replace regex-based structural checks.
      Goal:
      Replace heuristic validation with deterministic typed checks.
      Motivation:
      Reduce policy drift and make diagnostics machine-consumable.
      Alternative considerations:
      - keep regex-only validation and patch edge cases incrementally.
      - split checks into multiple ad-hoc scripts.
      Implementation details:
      - add typed validation logic and stable JSON diagnostics.
      - keep schema and dependency checks aligned with existing parser contracts.
      Layer: domain
      Feature state: active
    prompt: |
      Goal: Deliver this prompt task outcome deterministically.
      Motivation: Preserve explicit implementation rationale for review and lint compliance.
      Alternative considerations: Keep this as a focused task instead of implicit context-only execution.
      Implementation details: Apply file-scoped changes and verify stated acceptance criteria.
      Implement a typed validator at `skills/plan-to-invoker/scripts/validate-plan.ts` and
      wire `skills/plan-to-invoker/scripts/validate-plan.sh` to call it. The implementation
      must parse YAML structurally (not grep heuristics), must validate required fields,
      enum constraints from `packages/app/src/plan-parser.ts`, dependency references, and
      command/prompt exclusivity. Ensure deterministic JSON diagnostics with stable error keys,
      and ensure non-zero exit on any validation failure.
      Acceptance criteria:
      - `bash skills/plan-to-invoker/scripts/validate-plan.sh plans/plan-to-invoker-deterministic-step-1-validator.yaml` should pass.
      - A negative fixture should fail with stable JSON error keys and non-zero exit code.
    dependencies: []

  - id: add-validator-tests
    description: |
      Add regression tests for valid/invalid plans and deterministic error output.
      Goal:
      Prove validator behavior for positive and negative fixtures.
      Motivation:
      Prevent regressions in error-key stability and exit-code semantics.
      Alternative considerations:
      - rely only on manual spot checks.
      - test only positive fixtures.
      Implementation details:
      - add deterministic assertions for missing fields, enums, and dependency failures.
      - verify exact error-key payloads for at least one negative case.
      Layer: app_regression
      Feature state: active
    prompt: |
      Goal: Deliver this prompt task outcome deterministically.
      Motivation: Preserve explicit implementation rationale for review and lint compliance.
      Alternative considerations: Keep this as a focused task instead of implicit context-only execution.
      Implementation details: Apply file-scoped changes and verify stated acceptance criteria.
      Add tests under `skills/plan-to-invoker/scripts/` or repo test locations referenced by
      `scripts/test-plan-to-invoker-skill.sh`. Include positive and negative fixtures in
      `plans/` or a fixture directory. Tests must verify missing required fields, invalid enums,
      broken dependencies, and command+prompt conflict. Ensure tests assert deterministic output
      shape and stable error keys from the new validator.
      Acceptance criteria:
      - `bash scripts/test-plan-to-invoker-skill.sh` should pass.
      - At least one test must assert exact machine-readable error key content.
    dependencies:
      - implement-typed-plan-validator

  - id: run-plan-to-invoker-script-tests
    description: |
      Run existing plan-to-invoker script test suite.
      Goal:
      Confirm script-level regressions are not introduced.
      Motivation:
      Preserve end-to-end confidence after validator and test changes.
      Alternative considerations:
      - run only a subset of script tests.
      - defer script-suite verification to later workflows.
      Implementation details:
      - execute the script test suite and require zero failures.
      - keep this as the terminal focused proof for validator hardening.
      Layer: app_regression
      Feature state: active
    command: "bash scripts/test-plan-to-invoker-skill.sh"
    poolId: remote_digital_ocean_1_pool
    dependencies:
      - add-validator-tests
