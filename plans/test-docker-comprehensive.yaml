name: "Docker Comprehensive Test"
onFinish: none

# Comprehensive Docker executor test suite covering:
#   - Provisioning failures (bad image, bad clone)
#   - Runtime failures (exit 1, crash)
#   - Success cases (simple command, stdout+stderr output)
#   - Concurrent execution (3 parallel tasks)
#
# Run with: ./scripts/test-docker-comprehensive.sh

tasks:
  # ── Provisioning failures ──────────────────────────────────
  - id: docker-no-image
    description: "Docker task with non-existent image → should fail with 'No such image'"
    executorType: docker
    dockerImage: "invoker-nonexistent-image:v999"
    command: "echo 'Should never run'"
    dependencies: []

  # ── Runtime failures ───────────────────────────────────────
  - id: docker-cmd-exit-1
    description: "Docker command that exits with code 1"
    executorType: docker
    dockerImage: "invoker-agent:latest"
    command: "echo 'About to fail' && exit 1"
    dependencies: []

  - id: docker-cmd-crash
    description: "Docker command that crashes via SEGV signal"
    executorType: docker
    dockerImage: "invoker-agent:latest"
    command: "echo 'About to crash' && kill -SEGV $$"
    dependencies: []

  # ── Success cases ──────────────────────────────────────────
  - id: docker-cmd-ok
    description: "Docker command that succeeds"
    executorType: docker
    dockerImage: "invoker-agent:latest"
    command: "echo 'DOCKER_CMD_OK'"
    dependencies: []

  - id: docker-cmd-output
    description: "Docker command that writes to stdout and stderr"
    executorType: docker
    dockerImage: "invoker-agent:latest"
    command: "echo 'STDOUT_LINE' && echo 'STDERR_LINE' >&2"
    dependencies: []

  # ── Concurrent execution ───────────────────────────────────
  - id: docker-concurrent-a
    description: "Concurrent Docker task A"
    executorType: docker
    dockerImage: "invoker-agent:latest"
    command: "sleep 2 && echo 'CONCURRENT_A_DONE'"
    dependencies: []

  - id: docker-concurrent-b
    description: "Concurrent Docker task B"
    executorType: docker
    dockerImage: "invoker-agent:latest"
    command: "sleep 2 && echo 'CONCURRENT_B_DONE'"
    dependencies: []

  - id: docker-concurrent-c
    description: "Concurrent Docker task C"
    executorType: docker
    dockerImage: "invoker-agent:latest"
    command: "sleep 2 && echo 'CONCURRENT_C_DONE'"
    dependencies: []
