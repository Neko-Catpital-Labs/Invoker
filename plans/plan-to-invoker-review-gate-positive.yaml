name: Review gate fixture
description: |
  Adds an explicit review gate block to an implementation workflow.

  The plan keeps GitHub PR intent declarative with `mergeMode: github` and a
  review gate policy that does not fix the pull request count.
onFinish: pull_request
mergeMode: github
repoUrl: https://github.com/Neko-Catpital-Labs/Invoker.git
baseBranch: master
featureBranch: feature/review-gate-fixture

tasks:
  - id: implement-review-gate
    description: |
      Review claim:
      - Add explicit review gate intent without fixing the pull request count.
      Safety invariant:
      - This is a plan-only change with no runtime behavior change.
      Slice rationale:
      - Land the declarative review gate example before the final regression gate.
      Architectural effect:
      - The fixture shows YAML review intent while runtime persistence still uses `external_review`.
      Goal:
      - Define the review gate declaration for an implementation workflow fixture.
      Motivation:
      - Keep GitHub PR gate intent explicit without encoding a fixed PR count.
      Alternative considerations:
      - Option A (chosen): declare `reviewGate` with `required: all`.
      - Option B: add numeric PR-count fields like `requiredPullRequests`.
      Implementation details:
      - Update the fixture YAML so `mergeMode: github` stays in place.
      - Add a `reviewGate` block after `tasks`.
      - Keep `completion.required: all` and `completion.state: merged`.
      - Do not add `requiredPullRequests`, `prCount`, or numeric review counts.
      Non-goals:
      - Do not change runtime merge execution behavior.
      - Do not add Mergify fields to the YAML.
      Layer: api
      Feature state: active
      Files:
      - plans/plan-to-invoker-review-gate-positive.yaml
      Change types:
      - modify
      Acceptance criteria:
      - Ensure the fixture keeps `mergeMode: github` and uses the default pull-request review gate shape.
      Review lane: docs
      Review unit: explicit review gate intent
    prompt: |
      Review lane: docs
      Assume no prior context beyond this task description.
      Goal:
      - Define the review gate declaration for an implementation workflow fixture.
      Motivation:
      - Keep GitHub PR gate intent explicit without encoding a fixed PR count.
      Alternative considerations:
      - Option A (chosen): declare `reviewGate` with `required: all`.
      - Option B: add numeric PR-count fields like `requiredPullRequests`.
      Implementation details:
      - Edit plans/plan-to-invoker-review-gate-positive.yaml.
      - Keep `mergeMode: github`.
      - Add a `reviewGate` block with automatic authoring, stacked diffs preference, and merged completion.
      - Ensure no numeric PR-count fields appear anywhere in the file.
      Non-goals:
      - Do not change runtime merge execution behavior.
      - Do not add Mergify fields to the YAML.
      Acceptance criteria:
      - Verify the fixture still expresses PR review intent with `mergeMode: github`.
      - Verify the fixture contains `reviewGate.completion.required: all` and `reviewGate.completion.state: merged`.
      - Verify the fixture does not contain `requiredPullRequests`, `prCount`, or `completion.required: 3`.
      Files:
      - plans/plan-to-invoker-review-gate-positive.yaml
      Pass condition:
      - The YAML keeps GitHub review intent and the validator would reject any numeric PR count.
    dependencies: []

  - id: final-regression
    description: |
      Review claim:
      - Run the final regression gate for the review gate fixture.
      Safety invariant:
      - This task changes no product behavior and depends on the implementation task.
      Slice rationale:
      - Verification lands after the declarative review gate change.
      Architectural effect:
      - No runtime behavior changes; this task only proves the plan remains valid.
      Goal:
      - Run the final regression gate for the review gate fixture.
      Motivation:
      - Prove the implementation-style fixture still passes the repository regression gate.
      Alternative considerations:
      - Option A (chosen): keep a dedicated final regression task.
      - Option B: skip the final gate and rely only on local inspection.
      Implementation details:
      - Execute `pnpm run test:all` after the implementation task completes.
      Non-goals:
      - Do not change plan structure in this verification task.
      Layer: e2e_regression
      Feature state: active
      Files:
      - none
      Change types:
      - test
      Acceptance criteria:
      - Execute the repository final regression gate after the implementation task completes.
      Review lane: cleanup
      Review unit: final regression gate
    command: pnpm run test:all
    dependencies: [implement-review-gate]

reviewGate:
  type: pull_requests
  authoring:
    mode: automatic
    preferredShape: stacked_diffs
  completion:
    required: all
    state: merged
