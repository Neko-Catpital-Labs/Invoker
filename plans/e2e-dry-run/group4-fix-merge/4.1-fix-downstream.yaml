# E2E dry-run Group 4.1 — fix task A, approve, downstream B completes.
name: "e2e-dry-run group4 4.1 fix-downstream"
repoUrl: git@github.com:example-org/acme-repo.git
onFinish: none
mergeMode: manual
baseBranch: HEAD

tasks:
  - id: e2e-g441-taskA
    description: "E2E 4.1 — upstream task fails (needs fix)"
    command: exit 1
    dependencies: []
  - id: e2e-g441-taskB
    description: "E2E 4.1 — downstream task depends on A"
    command: echo downstream-ok
    dependencies: [e2e-g441-taskA]
