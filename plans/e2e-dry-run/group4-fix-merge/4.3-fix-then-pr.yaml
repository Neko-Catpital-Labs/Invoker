# E2E dry-run Group 4.3 — fix A, approve, downstream B completes, merge gate creates PR.
name: "e2e-dry-run group4 4.3 fix-then-pr"
repoUrl: git@github.com:example-org/acme-repo.git
onFinish: none
mergeMode: external_review
featureBranch: experiment/e2e-g443-fix-pr
baseBranch: HEAD

tasks:
  - id: e2e-g443-taskA
    description: "E2E 4.3 — upstream task fails (needs fix)"
    command: exit 1
    dependencies: []
  - id: e2e-g443-taskB
    description: "E2E 4.3 — downstream task depends on A"
    command: echo downstream-ok
    dependencies: [e2e-g443-taskA]
