# E2E dry-run Group 2.7 — fan-in: A fails, fix+approve A → C unblocks.
name: "e2e-dry-run group2 2.7 fan-in fix"
repoUrl: git@github.com:example-org/acme-repo.git
onFinish: none
mergeMode: manual
baseBranch: HEAD

tasks:
  - id: e2e-g227-taskA
    description: "E2E 2.7 — parallel branch A fails"
    command: exit 1
    dependencies: []
  - id: e2e-g227-taskB
    description: "E2E 2.7 — parallel branch B succeeds"
    command: echo fan-b-ok
    dependencies: []
  - id: e2e-g227-taskC
    description: "E2E 2.7 — fan-in depends on A and B"
    command: echo fan-in-ok
    dependencies: [e2e-g227-taskA, e2e-g227-taskB]
