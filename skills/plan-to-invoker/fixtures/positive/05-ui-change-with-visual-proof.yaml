# UI Change Plan with Visual Proof
# Description: Demonstrates the required pattern for UI change plans that modify packages/ui/.
# When visualProof is true, the plan must include: (1) a prompt task that adds an E2E test case
# to visual-proof.spec.ts using captureScreenshot, (2) a command task that builds and captures
# after-state screenshots via ui-visual-proof.sh, and (3) at least one task referencing packages/ui/.
#
# This pattern ensures every UI change produces before/after screenshot comparisons for review.
# The agent captures "before" screenshots on the base branch during Phase 1b-visual;
# the "after" capture task in this plan produces the comparison set.

name: "Fix sidebar collapse animation"
description: |
  Fixes the sidebar collapse transition in packages/ui/src/Sidebar.tsx which currently
  snaps to closed state instead of animating smoothly.

  Root cause: the CSS transition property is applied after the width change, causing
  the browser to skip the animation. The fix reorders the style application so the
  transition property is set before the width change.

  Blast radius: only affects Sidebar component rendering. No data flow or state
  management changes. All existing sidebar unit tests must continue to pass.
visualProof: true
onFinish: pull_request
mergeMode: github
repoUrl: git@github.com:example-org/acme-repo.git
baseBranch: main
featureBranch: fix/sidebar-collapse-animation

tasks:
  - id: add-visual-proof-test
    description: "Add E2E test case capturing sidebar collapse states for visual comparison"
    prompt: |
      In packages/app/e2e/visual-proof.spec.ts, add a new test case that must verify the
      sidebar renders correctly in both expanded and collapsed states. The test must use
      captureScreenshot from packages/app/e2e/fixtures/electron-app.ts to capture screenshots.
      Steps: (1) Load the default layout using loadPlan() helper. (2) Call
      captureScreenshot(page, 'sidebar-collapse-expanded') with sidebar open. (3) Click the
      sidebar toggle button to collapse it. (4) Wait 500ms for animation. (5) Call
      captureScreenshot(page, 'sidebar-collapse-collapsed') with sidebar closed. (6) Ensure
      the sidebar element has the expected 'collapsed' CSS class after toggling.
    dependencies: []

  - id: fix-sidebar-transition
    description: "Reorder CSS transition application in packages/ui/ Sidebar component"
    prompt: |
      In packages/ui/src/Sidebar.tsx, fix the collapse animation. The Sidebar must animate
      smoothly between expanded and collapsed states. Locate the toggleCollapse handler in
      packages/ui/src/Sidebar.tsx and move the transition assignment (transition: 'width
      200ms ease-in-out') so it is set on the container element before the width property
      changes. Ensure the collapsed state applies width: 48px and expanded applies width:
      240px. Verify the component still reads the isCollapsed prop from packages/ui/src/types.ts.
      The transition property must be declared before the width change in the style object.
      No changes to the component's public API or prop interface are expected.
    dependencies: []

  - id: run-sidebar-unit-tests
    description: "Run UI package unit tests to verify sidebar fix"
    command: "cd packages/ui && pnpm test 2>&1"
    dependencies: [fix-sidebar-transition]

  - id: capture-visual-proof
    description: "Build UI and app packages then capture after-state screenshots"
    command: "pnpm --filter @invoker/ui build && pnpm --filter @invoker/app build && bash scripts/ui-visual-proof.sh --label after"
    dependencies: [fix-sidebar-transition, add-visual-proof-test]

  - id: verify-regression-suite
    description: "Re-run UI unit tests as final regression gate"
    command: "cd packages/ui && pnpm test 2>&1"
    dependencies: [run-sidebar-unit-tests, capture-visual-proof]
