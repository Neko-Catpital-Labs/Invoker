# runnerKind must be one of: worktree, ssh, docker

name: "Invalid runnerKind enum"
repoUrl: git@github.com:example-org/acme-repo.git

tasks:
  - id: invalid-executor
    description: "Task with invalid runnerKind"
    command: "echo test"
    runnerKind: invalid_type
    dependencies: []
