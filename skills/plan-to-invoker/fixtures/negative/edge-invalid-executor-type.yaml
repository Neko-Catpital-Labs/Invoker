# Edge case: Obsolete runnerKind field (task level)
# Expected error: unsupported_field (field: runnerKind)
#
# Omit runnerKind for default worktree execution. Use poolId for configured
# pools or dockerImage for Docker tasks.

name: "Unsupported runnerKind field"
repoUrl: git@github.com:example-org/acme-repo.git

tasks:
  - id: invalid-executor
    description: "Task with obsolete runnerKind"
    command: "echo test"
    runnerKind: worktree
    dependencies: []
