name: "{{feature_summary}} (3) api layer"
description: |
  Implement the api/surface layer of {{feature_summary}} on top of the domain
  layer and prove it with `{{l3_verify}}`.

  REPLACE_ME: describe the api/surface-layer change (the user- or caller-facing
  entry point) in 1-3 paragraphs before submitting. This step is gated on the
  domain workflow's merge.
onFinish: pull_request
mergeMode: external_review
baseBranch: {{base_branch}}
repoUrl: {{repo_url}}

externalDependencies:
  # submit-workflow-chain.sh injects taskId: "__merge__" and gatePolicy here at
  # submit time; do not hardcode them or the injector duplicates the gatePolicy key.
  - workflowId: "__UPSTREAM_WORKFLOW_ID__"
    requiredStatus: completed

tasks:
  - id: implement-{{feature_slug}}-surface
    description: |
      Implement the api/surface-layer part of {{feature_summary}}.
      Review claim: Delivers the api layer for {{feature_summary}} with no unrelated edits. REPLACE_ME with the precise one-unit claim.
      Review lane: behavior
      Safety invariant: Only the api layer changes; all other behavior in {{l3_file}} stays identical.
      Slice rationale: One layer slice built on the domain layer; it is the top of the stack. REPLACE_ME.
      Architectural effect: Adds the api layer of {{feature_summary}} on top of domain; nothing depends on it yet.
      Goal: Implement the api layer so `{{l3_verify}}` passes.
      Motivation: {{feature_summary}} needs a caller-facing entry point over its domain layer. REPLACE_ME with user impact.
      Alternative considerations: Bundling the api with the domain layer was rejected as unreviewable. REPLACE_ME.
      Implementation details: Implement the api layer in {{l3_file}}; keep everything else identical. REPLACE_ME with the concrete change.
      Non-goals: No persistence or domain work here, no refactor, no unrelated cleanup, no doc edits.
      Layer: api
      Feature state: active
      Files: {{l3_file}}
      Change types:
      - {{l3_file}}: modify
      Acceptance criteria:
      - `{{l3_verify}}` exits 0 after the change.
    prompt: |
      Goal: Implement the api layer of {{feature_summary}} so its proof passes.
      Review lane: behavior
      Motivation: {{feature_summary}} needs a caller-facing entry point. REPLACE_ME with user impact.
      Alternative considerations: Do not bundle domain or persistence work here. REPLACE_ME.
      Implementation details: Edit {{l3_file}} to implement this layer only. REPLACE_ME with the concrete change.
      Non-goals: No persistence or domain work, no refactor, no unrelated cleanup.
      Assume no prior context. You are given only this task.
      Implement the api layer described above in {{l3_file}}. Touch nothing outside this layer.
      Acceptance criteria:
      - `{{l3_verify}}` exits 0 after your change (this is the pass condition).
    dependencies: []

  - id: verify-{{feature_slug}}-surface
    description: |
      Run the deterministic proof for the api layer of {{feature_summary}}.
      Review claim: `{{l3_verify}}` passes only when the api layer is correct.
      Review lane: proof
      Safety invariant: Proof-only; adds no product behavior.
      Slice rationale: One proof slice for the api layer.
      Architectural effect: None; verification only.
      Goal: Prove the api layer deterministically.
      Motivation: Each layer carries its own proof. REPLACE_ME if the proof differs.
      Alternative considerations: Manual verification was rejected as non-deterministic.
      Implementation details: Execute `{{l3_verify}}` as the terminal proof.
      Non-goals: No product edits here; proof only.
      Layer: app_regression
      Feature state: active
    command: "{{l3_verify}}"
    dependencies:
      - implement-{{feature_slug}}-surface
