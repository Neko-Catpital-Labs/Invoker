name: "{{feature_summary}} (2) domain layer"
description: |
  Implement the domain layer of {{feature_summary}} on top of the persistence
  layer and prove it with `{{l2_verify}}`.

  REPLACE_ME: describe the domain-layer change (core logic) in 1-3 paragraphs
  before submitting. This step is gated on the persistence workflow's merge.
onFinish: pull_request
mergeMode: external_review
baseBranch: {{base_branch}}
repoUrl: {{repo_url}}

externalDependencies:
  # submit-workflow-chain.sh injects taskId: "__merge__" and gatePolicy here at
  # submit time; do not hardcode them or the injector duplicates the gatePolicy key.
  - workflowId: "__UPSTREAM_WORKFLOW_ID__"
    requiredStatus: completed

tasks:
  - id: implement-{{feature_slug}}-domain
    description: |
      Implement the domain-layer part of {{feature_summary}}.
      Review claim: Delivers the domain layer for {{feature_summary}} with no unrelated edits. REPLACE_ME with the precise one-unit claim.
      Review lane: behavior
      Safety invariant: Only the domain layer changes; all other behavior in {{l2_file}} stays identical.
      Slice rationale: One layer slice built on the persistence layer; the api layer builds on this one. REPLACE_ME.
      Architectural effect: Adds the domain layer of {{feature_summary}} on top of persistence; the api layer depends on it.
      Goal: Implement the domain layer so `{{l2_verify}}` passes.
      Motivation: {{feature_summary}} needs domain logic over its persistence layer. REPLACE_ME with user impact.
      Alternative considerations: Bundling domain with persistence was rejected as unreviewable. REPLACE_ME.
      Implementation details: Implement the domain layer in {{l2_file}}; keep everything else identical. REPLACE_ME with the concrete change.
      Non-goals: No persistence or api work here, no refactor, no unrelated cleanup, no doc edits.
      Layer: domain
      Feature state: active
      Files: {{l2_file}}
      Change types:
      - {{l2_file}}: modify
      Acceptance criteria:
      - `{{l2_verify}}` exits 0 after the change.
    prompt: |
      Goal: Implement the domain layer of {{feature_summary}} so its proof passes.
      Review lane: behavior
      Motivation: {{feature_summary}} needs domain logic over persistence. REPLACE_ME with user impact.
      Alternative considerations: Do not bundle persistence or api work here. REPLACE_ME.
      Implementation details: Edit {{l2_file}} to implement this layer only. REPLACE_ME with the concrete change.
      Non-goals: No persistence or api work, no refactor, no unrelated cleanup.
      Assume no prior context. You are given only this task.
      Implement the domain layer described above in {{l2_file}}. Touch nothing outside this layer.
      Acceptance criteria:
      - `{{l2_verify}}` exits 0 after your change (this is the pass condition).
    dependencies: []

  - id: verify-{{feature_slug}}-domain
    description: |
      Run the deterministic proof for the domain layer of {{feature_summary}}.
      Review claim: `{{l2_verify}}` passes only when the domain layer is correct.
      Review lane: proof
      Safety invariant: Proof-only; adds no product behavior.
      Slice rationale: One proof slice for the domain layer.
      Architectural effect: None; verification only.
      Goal: Prove the domain layer deterministically.
      Motivation: Each layer carries its own proof. REPLACE_ME if the proof differs.
      Alternative considerations: Manual verification was rejected as non-deterministic.
      Implementation details: Execute `{{l2_verify}}` as the terminal proof.
      Non-goals: No product edits here; proof only.
      Layer: app_regression
      Feature state: active
    command: "{{l2_verify}}"
    dependencies:
      - implement-{{feature_slug}}-domain
