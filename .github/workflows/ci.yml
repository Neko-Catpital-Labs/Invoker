# Full matrix: Vitest (all packages) + headless e2e-dry-run + e2e-ssh (skip if no sshd)
# + Playwright Electron + verify-executor-routing. See scripts/test-suites/README.md.
name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-all:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright system dependencies (Electron E2E)
        run: pnpm --filter @invoker/app exec playwright install --with-deps

      - name: Run full test matrix (test:all)
        run: pnpm run test:all
