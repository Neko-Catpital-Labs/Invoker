name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  CI: true
  NODE_VERSION: '26'

jobs:
  build-cli:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux
            arch: x64
          - runner: ubuntu-24.04-arm
            platform: linux
            arch: arm64
          - runner: macos-13
            platform: darwin
            arch: x64
          - runner: macos-latest
            platform: darwin
            arch: arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            .node-version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build standalone CLI
        env:
          INVOKER_TARGET_PLATFORM: ${{ matrix.platform }}
          INVOKER_TARGET_ARCH: ${{ matrix.arch }}
        run: pnpm run dist:cli

      - name: Upload CLI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            release/invoker-cli-*
          if-no-files-found: error

  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            build_command: pnpm run dist:desktop:linux
            artifact_name: desktop-linux
            artifact_glob: |
              release/*.AppImage
              release/*.deb
          - runner: macos-latest
            build_command: pnpm run dist:desktop:mac:arm64
            artifact_name: desktop-mac-arm64
            artifact_glob: |
              release/*.dmg
              release/*.zip
          - runner: macos-13
            build_command: pnpm run dist:desktop:mac:x64
            artifact_name: desktop-mac-x64
            artifact_glob: |
              release/*.dmg
              release/*.zip

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            .node-version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop artifacts
        run: ${{ matrix.build_command }}

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_glob }}
          if-no-files-found: error

  publish-release:
    needs:
      - build-cli
      - build-desktop
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*'
          merge-multiple: true
          path: release

      - name: Generate combined checksums
        run: bash scripts/release-sha256.sh

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.deb
            release/*.AppImage
            release/*.zip
            release/invoker-cli-*
            release/SHA256SUMS

      - name: Install pnpm
        if: startsWith(github.ref, 'refs/tags/v')
        uses: pnpm/action-setup@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          registry-url: https://registry.npmjs.org
          cache-dependency-path: |
            pnpm-lock.yaml
            .node-version

      - name: Install dependencies for npm publish
        if: startsWith(github.ref, 'refs/tags/v')
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Publish npm packages
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          pnpm --filter @neko-catpital-labs/invoker-cli publish --access public --no-git-checks
          pnpm --filter @neko-catpital-labs/invoker-ui publish --access public --no-git-checks
