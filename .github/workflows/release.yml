name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CI: true
  NODE_VERSION: '22'

jobs:
  build-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            build_command: pnpm run dist:desktop:linux
            artifact_name: release-linux
            artifact_glob: |
              release/*.AppImage
              release/*.deb
          - runner: macos-latest
            build_command: pnpm run dist:desktop:mac:arm64
            artifact_name: release-mac-arm64
            artifact_glob: |
              release/*.dmg
          - runner: macos-13
            build_command: pnpm run dist:desktop:mac:x64
            artifact_name: release-mac-x64
            artifact_glob: |
              release/*.dmg

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop artifacts
        run: ${{ matrix.build_command }}

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_glob }}
          if-no-files-found: error

  publish-release:
    needs: build-release
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release

      - name: Generate combined checksums
        run: bash scripts/release-sha256.sh

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.deb
            release/*.AppImage
            release/SHA256SUMS
