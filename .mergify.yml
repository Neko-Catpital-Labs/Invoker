# Temporary merge queue — keeps master always green via rebase + retest.
# May be replaced by GitHub native merge queue or custom SubmitQueue later.

queue_rules:
  - name: default
    autoqueue: true
    merge_method: squash
    batch_size: 5
    checks_timeout: 120min
    # Gate entry: PR must target master and pass CI.
    queue_conditions:
      - base=master
      - check-success=test-all
      - -draft
    # Gate merge: CI must pass again on the rebased code.
    merge_conditions:
      - check-success=test-all
