name: "E2E Hello World (Docker static image)"
description: |
  Single-task Invoker plan used by scripts/e2e-docker-hello-world.sh to
  exercise the full DockerExecutor pipeline against a fixture image. Uses
  an AI prompt task instead of a shell command so the script also covers
  the agent CLI + secrets.env injection path.

onFinish: none

tasks:
  - id: hello
    description: "Ask the configured AI agent to print Hello, world!"
    runnerKind: docker
    prompt: 'Respond with the literal string: Hello, world!'
